<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>委託記錄管理系統</title>
    <!-- 載入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 載入 React 核心庫 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- 載入 Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=DotGothic16&family=Silkscreen:wght@400;700&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        /**
         * ==========================================
         * ✨ 復古風設計風格配置區
         * ==========================================
         */
        const THEME = {
            fontFamily: "'精品點陣體9×9 1.92', 'DotGothic16', 'Noto Sans TC', system-ui, sans-serif",
            primary: "#334155", 
            primaryHover: "#1e293b", 
            primaryLight: "#f1f5f9", 
            success: "#916430", 
            successBg: "#faf6f0", 
            warning: "#9a3412", 
            warningBg: "#fff7ed", 
            bgMain: "#f8fafc", 
            bgCard: "#ffffff",
            border: "#e2e8f0", 
        };

        /**
         * ==========================================
         * 🛠️ 原生 SVG 圖示組件
         * 修正：使用 <g> 包裹多個 SVG 元素以符合 JSX 語法
         * ==========================================
         */
        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                Plus: <path d="M5 12h14m-7-7v14" />,
                X: <path d="M18 6 6 18M6 6l12 12" />,
                Check: <path d="M20 6 9 17l-5-5" />,
                Pencil: <path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z" />,
                Trash: <path d="M3 6h18m-2 0v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6m3 0V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2" />,
                Grip: (
                    <g>
                        <circle cx="9" cy="12" r="1"/><circle cx="9" cy="5" r="1"/><circle cx="9" cy="19" r="1"/>
                        <circle cx="15" cy="12" r="1"/><circle cx="15" cy="5" r="1"/><circle cx="15" cy="19" r="1"/>
                    </g>
                ),
                Layout: (
                    <g>
                        <rect width="18" height="18" x="3" y="3" rx="2" />
                        <path d="M3 9h18M9 21V9" />
                    </g>
                ),
                User: (
                    <g>
                        <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" />
                        <circle cx="12" cy="7" r="4" />
                    </g>
                ),
                Settings: (
                    <g>
                        <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.72V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.17a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z" />
                        <circle cx="12" cy="12" r="3" />
                    </g>
                ),
                ShoppingBag: (
                    <g>
                        <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z" />
                        <path d="M3 6h18M16 10a4 4 0 0 1-8 0" />
                    </g>
                ),
                Download: (
                    <g>
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                        <polyline points="7 10 12 15 17 10" />
                        <line x1="12" x2="12" y1="15" y2="3" />
                    </g>
                ),
                Upload: (
                    <g>
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                        <polyline points="17 8 12 3 7 8" />
                        <line x1="12" x2="12" y1="3" y2="15" />
                    </g>
                )
            };

            return (
                <svg 
                    width={size} 
                    height={size} 
                    viewBox="0 0 24 24" 
                    fill="none" 
                    stroke="currentColor" 
                    strokeWidth="2" 
                    strokeLinecap="round" 
                    strokeLinejoin="round" 
                    className={className}
                >
                    {icons[name] || null}
                </svg>
            );
        };

        function App() {
            const [projects, setProjects] = useState(() => {
                const saved = localStorage.getItem('commission_projects');
                return saved ? JSON.parse(saved) : [
                    {
                        id: 'default-1',
                        name: '我的第一個委託單',
                        items: [{ id: 'i1', name: '頭貼', price: 500 }],
                        records: []
                    }
                ];
            });

            const [activeProjectId, setActiveProjectId] = useState(projects[0]?.id);
            const [editingRecordId, setEditingRecordId] = useState(null);
            const [editFormData, setEditFormData] = useState(null);
            const [isConfiguringItems, setIsConfiguringItems] = useState(false);
            
            const [draggedItemIndex, setDraggedItemIndex] = useState(null);
            const [draggedProjectIndex, setDraggedProjectIndex] = useState(null);

            useEffect(() => {
                localStorage.setItem('commission_projects', JSON.stringify(projects));
            }, [projects]);

            const activeProject = useMemo(() => 
                projects.find(p => p.id === activeProjectId) || projects[0], 
                [projects, activeProjectId]
            );

            const totalAmount = useMemo(() => {
                if (!activeProject) return 0;
                return activeProject.records.reduce((sum, record) => sum + (Number(record.amount) || 0), 0);
            }, [activeProject]);

            const exportData = () => {
                const dataStr = JSON.stringify(projects, null, 2);
                const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
                const linkElement = document.createElement('a');
                linkElement.setAttribute('href', dataUri);
                linkElement.setAttribute('download', `委託紀錄備份_${new Date().toLocaleDateString()}.json`);
                linkElement.click();
            };

            const importData = (e) => {
                const fileReader = new FileReader();
                if (!e.target.files[0]) return;
                fileReader.readAsText(e.target.files[0], "UTF-8");
                fileReader.onload = (event) => {
                    try {
                        const parsed = JSON.parse(event.target.result);
                        if (Array.isArray(parsed)) {
                            setProjects(parsed);
                            setActiveProjectId(parsed[0].id);
                        }
                    } catch (err) { console.error("導入失敗", err); }
                };
            };

            const onDragStart = (index, type) => {
                if (type === 'project') setDraggedProjectIndex(index);
                if (type === 'record') setDraggedItemIndex(index);
            };

            const onDrop = (index, type) => {
                if (type === 'project' && draggedProjectIndex !== null) {
                    const newProjects = [...projects];
                    const draggedItem = newProjects[draggedProjectIndex];
                    newProjects.splice(draggedProjectIndex, 1);
                    newProjects.splice(index, 0, draggedItem);
                    setProjects(newProjects);
                    setDraggedProjectIndex(null);
                }
                if (type === 'record' && draggedItemIndex !== null) {
                    const newRecords = [...activeProject.records];
                    const draggedItem = newRecords[draggedItemIndex];
                    newRecords.splice(draggedItemIndex, 1);
                    newRecords.splice(index, 0, draggedItem);
                    setProjects(projects.map(p => p.id === activeProjectId ? { ...p, records: newRecords } : p));
                    setDraggedItemIndex(null);
                }
            };

            const addProject = () => {
                const newId = Date.now().toString();
                setProjects([...projects, { id: newId, name: '新委託分頁', description: '', items: [], records: [] }]);
                setActiveProjectId(newId);
            };

            const deleteProject = (id, e) => {
                e.stopPropagation();
                if (projects.length <= 1) return;
                const filtered = projects.filter(p => p.id !== id);
                setProjects(filtered);
                if (activeProjectId === id) setActiveProjectId(filtered[0].id);
            };

            const updateProjectName = (newName) => {
                setProjects(projects.map(p => p.id === activeProjectId ? { ...p, name: newName } : p));
            };

            const updateProjectDescription = (newDesc) => {
                setProjects(projects.map(p => p.id === activeProjectId ? { ...p, description: newDesc } : p));
            };

            const updateProjectItems = (newItems) => {
                setProjects(projects.map(p => p.id === activeProjectId ? { ...p, items: newItems } : p));
            };

            const addRecord = () => {
                const newRecord = { id: Date.now().toString(), clientId: '新委託人', selectedItems: [], addonText: '', addonPrice: 0, amount: 0 };
                setProjects(projects.map(p => p.id === activeProjectId ? { ...p, records: [newRecord, ...p.records] } : p));
                setEditingRecordId(newRecord.id);
                setEditFormData({ ...newRecord });
            };

            const saveEdit = () => {
                setProjects(projects.map(p => p.id === activeProjectId ? { ...p, records: p.records.map(r => r.id === editingRecordId ? editFormData : r) } : p));
                setEditingRecordId(null);
            };

            const deleteRecord = (id) => {
                setProjects(projects.map(p => p.id === activeProjectId ? { ...p, records: p.records.filter(r => r.id !== id) } : p));
            };

            return (
                <div className="flex h-screen overflow-hidden text-slate-800" style={{ backgroundColor: THEME.bgMain, fontFamily: THEME.fontFamily }}>
                    {/* 左側：分頁清單 */}
                    <aside className="w-64 bg-white border-r flex flex-col shadow-sm" style={{ borderColor: THEME.border }}>
                        <div className="p-6 flex items-center justify-between border-b" style={{ borderColor: THEME.border }}>
                            <h1 className="font-bold text-xl flex items-center gap-2" style={{ color: THEME.primary }}>
                                <Icon name="Layout" size={20} /> 委託記錄管理
                            </h1>
                            <button onClick={addProject} className="p-1.5 hover:bg-slate-100 rounded-lg transition-colors">
                                <Icon name="Plus" size={20} />
                            </button>
                        </div>
                        <div className="flex-1 overflow-y-auto p-3 space-y-1">
                            {projects.map((p, index) => (
                                <div 
                                    key={p.id}
                                    draggable
                                    onDragStart={() => onDragStart(index, 'project')}
                                    onDragOver={(e) => e.preventDefault()}
                                    onDrop={() => onDrop(index, 'project')}
                                    onClick={() => setActiveProjectId(p.id)}
                                    className={`group flex items-center justify-between p-3 rounded-xl cursor-grab active:cursor-grabbing transition-all ${activeProjectId === p.id ? 'shadow-md shadow-slate-200' : 'hover:bg-slate-100 text-slate-600'}`}
                                    style={{ backgroundColor: activeProjectId === p.id ? THEME.primary : 'transparent', color: activeProjectId === p.id ? '#ffffff' : '' }}
                                >
                                    <div className="flex items-center gap-3 truncate">
                                        <Icon name="Grip" size={14} className="opacity-30 group-hover:opacity-100" />
                                        <span className="font-medium truncate tracking-wide">{p.name}</span>
                                    </div>
                                    {projects.length > 1 && (
                                        <button onClick={(e) => deleteProject(p.id, e)} className="opacity-0 group-hover:opacity-100 p-1 hover:bg-white/20 rounded">
                                            <Icon name="X" size={14} />
                                        </button>
                                    )}
                                </div>
                            ))}
                        </div>
                        <div className="p-4 border-t space-y-2" style={{ borderColor: THEME.border }}>
                            <button onClick={exportData} className="w-full flex items-center justify-center gap-2 text-xs font-bold py-2 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-lg transition-all">
                                <Icon name="Download" size={14} /> 導出 JSON 備份
                            </button>
                            <label className="w-full flex items-center justify-center gap-2 text-xs font-bold py-2 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-lg transition-all cursor-pointer">
                                <Icon name="Upload" size={14} /> 導入紀錄檔案
                                <input type="file" className="hidden" accept=".json" onChange={importData} />
                            </label>
                        </div>
                    </aside>

                    {/* 右側：內容區 */}
                    <div className="flex-1 overflow-y-auto">
                        <div className="max-w-5xl mx-auto px-6 py-12 space-y-8">
                            <section className="bg-white rounded-3xl p-8 shadow-sm border border-slate-200" style={{ borderColor: THEME.border }}>
                                <div className="flex flex-col md:flex-row justify-between gap-6">
                                    <div className="space-y-4 flex-1">
                                        <div className="flex items-center">
                                        <span className="text-4xl font-black mr-3 select-none" style={{ color: THEME.border }}>▸</span>
                                        <input 
                                            type="text" value={activeProject?.name || ''} 
                                            onChange={(e) => updateProjectName(e.target.value)}
                                            className="text-4xl font-black text-slate-800 bg-transparent border-b-2 border-transparent hover:border-slate-100 focus:border-slate-500 focus:outline-none focus:ring-0 transition-all w-full tracking-tighter"
                                            style={{ outline: 'none' }}
                                        />
                                        </div>
                                        {/* 副標題 / 備註欄位 */}
                                        <div className="pl-9"> {/* pl-9 代表左側內距 */}
                                            <input 
                                                type="text" 
                                                placeholder="在此輸入備註或補充文字..."
                                                value={activeProject?.description || ''} 
                                                onChange={(e) => updateProjectDescription(e.target.value)}
                                                className="w-full bg-transparent border-b border-transparent hover:border-slate-100 focus:border-slate-300 focus:outline-none focus:ring-0 text-slate-500 text-sm font-medium transition-all"
                                                style={{ fontFamily: THEME.fontFamily, outline: 'none' }}
                                            />
                                        </div>
                                    </div>
                                    <div className="rounded-2xl px-8 py-4 text-right flex flex-col justify-center" style={{ backgroundColor: THEME.successBg }}>
                                        <span className="text-xs font-black uppercase tracking-widest block mb-1" style={{ color: THEME.success }}>本次勞動總金額</span>
                                        <span className="text-3xl font-black" style={{ color: THEME.success }}>
                                            <small className="text-base font-normal opacity-70 mr-1">NT$</small>
                                            {totalAmount.toLocaleString()}
                                        </span>
                                    </div>
                                </div>
                            </section>

                            <section className="space-y-4">
                                <div className="flex justify-between items-center">
                                    <h2 className="text-xl font-bold text-slate-800 flex items-center gap-2">
                                        <Icon name="User" size={20} className="text-slate-500" style={{ color: THEME.primary }} /> 委託人清單
                                    </h2>

                                    <div className="flex gap-3">
                                        <button onClick={() => setIsConfiguringItems(true)} className="flex items-center gap-2 px-5 py-2.5 bg-slate-200 hover:bg-slate-300 text-slate-700 rounded-2xl transition-all shadow-lg font-bold text-sm">
                                            <Icon name="Settings" size={16} /> 品項設定
                                            </button>
                                    <button onClick={addRecord} className="flex items-center gap-2 px-5 py-2.5 text-white rounded-2xl transition-all shadow-lg font-bold text-sm" style={{ backgroundColor: THEME.primary }}>
                                        <Icon name="Plus" size={16} /> 新增委託人
                                    </button>
                                        </div>
                                </div>

                                <div className="bg-white rounded-3xl border shadow-sm overflow-hidden" style={{ borderColor: THEME.border }}>
                                    <table className="w-full text-left">
                                        <thead>
                                            <tr className="bg-slate-50/50 border-b" style={{ borderColor: THEME.border }}>
                                                <th className="w-12 px-6 py-4"></th>
                                                <th className="px-6 py-4 text-xs font-black text-slate-400 uppercase tracking-widest">委託人 ID</th>
                                                <th className="px-6 py-4 text-xs font-black text-slate-400 uppercase tracking-widest">內容品項</th>
                                                <th className="px-6 py-4 text-xs font-black text-slate-400 uppercase tracking-widest">金額</th>
                                                <th className="px-6 py-4 text-xs font-black text-slate-400 uppercase tracking-widest text-right"></th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y" style={{ borderColor: THEME.border }}>
                                            {activeProject?.records.map((record, index) => (
                                                <tr 
                                                    key={record.id}
                                                    className={`transition-colors ${draggedItemIndex === index ? 'opacity-50' : 'hover:bg-slate-50/50'}`}
                                                >
                                                    {editingRecordId === record.id ? (
                                                        <>
                                                            <td className="px-6 py-4"><Icon name="Grip" size={16} className="text-slate-300" /></td>
                                                            <td className="px-6 py-4">
                                                                <input 
                                                                    type="text" className="w-full p-2 border rounded-lg focus:ring-2 focus:ring-slate-500 outline-none font-bold text-sm"
                                                                    value={editFormData.clientId}
                                                                    onChange={(e) => setEditFormData({...editFormData, clientId: e.target.value})}
                                                                />
                                                            </td>
                                                            <td className="px-6 py-4 space-y-4">
                                                                <div className="flex flex-wrap gap-2">
                                                                    {activeProject.items.map(item => {
                                                                        const found = editFormData.selectedItems.find(si => si.name === item.name);
                                                                        return (
                                                                            <div key={item.id} className="flex items-center bg-slate-100 p-1 pr-2 gap-2 border border-slate-200 rounded-none">
                                                                                <span className="text-xs pl-2 font-bold text-slate-600">{item.name}</span>
                                                                                <input 
                                                                                    type="number" min="0" className="w-10 text-center bg-white rounded-none border border-slate-200 text-xs p-1 outline-none"
                                                                                    value={found ? found.count : 0}
                                                                                    onChange={(e) => {
                                                                                        const count = parseInt(e.target.value) || 0;
                                                                                        let newSelected = [...editFormData.selectedItems];
                                                                                        if (count > 0) {
                                                                                            const idx = newSelected.findIndex(s => s.name === item.name);
                                                                                            if (idx > -1) newSelected[idx].count = count;
                                                                                            else newSelected.push({ name: item.name, count, price: item.price });
                                                                                        } else newSelected = newSelected.filter(s => s.name !== item.name);
                                                                                        const baseTotal = newSelected.reduce((s, i) => s + (i.price * i.count), 0);
                                                                                        setEditFormData({ ...editFormData, selectedItems: newSelected, amount: baseTotal + (Number(editFormData.addonPrice) || 0) });
                                                                                    }}
                                                                                />
                                                                            </div>
                                                                        );
                                                                    })}
                                                                </div>
                                                                <div className="flex gap-2">
                                                                    <input type="text" placeholder="加購內容" className="flex-1 p-2 border rounded-none text-sm" value={editFormData.addonText} onChange={(e) => setEditFormData({...editFormData, addonText: e.target.value})} />
                                                                    <input type="number" placeholder="金額" step="10" className="w-24 p-2 border rounded-none text-sm font-bold" value={editFormData.addonPrice} onChange={(e) => {
                                                                        const val = Number(e.target.value) || 0;
                                                                        const baseTotal = editFormData.selectedItems.reduce((s, i) => s + (i.price * i.count), 0);
                                                                        setEditFormData({...editFormData, addonPrice: val, amount: baseTotal + val});
                                                                    }} />
                                                                </div>
                                                            </td>
                                                            <td className="px-6 py-4">
                                                                <input type="number" step="10" className="w-28 p-2 border rounded-none font-black outline-none" style={{ backgroundColor: THEME.primaryLight, color: THEME.primary }} value={editFormData.amount} onChange={(e) => setEditFormData({...editFormData, amount: Number(e.target.value)})} />
                                                            </td>
                                                            <td className="px-6 py-4 text-right">
                                                                <div className="flex justify-end gap-2">
                                                                    <button onClick={saveEdit} className="p-2 text-white rounded-lg shadow-sm" style={{ backgroundColor: THEME.primary }}>
                                                                        <Icon name="Check" size={18} />
                                                                    </button>
                                                                    <button onClick={() => setEditingRecordId(null)} className="p-2 bg-slate-100 text-slate-400 rounded-lg hover:bg-slate-200">
                                                                        <Icon name="X" size={18} />
                                                                    </button>
                                                                </div>
                                                            </td>
                                                        </>
                                                    ) : (
                                                        <>
                                                            <td 
                                                                className="px-6 py-4 cursor-grab active:cursor-grabbing text-slate-300"
                                                                draggable
                                                                onDragStart={() => onDragStart(index, 'record')}
                                                                onDragOver={(e) => e.preventDefault()}
                                                                onDrop={() => onDrop(index, 'record')}
                                                            >
                                                                <Icon name="Grip" size={16} />
                                                            </td>
                                                            <td className="px-6 py-4 font-bold text-slate-700 text-sm tracking-wide">{record.clientId}</td>
                                                            <td className="px-6 py-4">
                                                                <div className="flex flex-wrap gap-2">
                                                                    {record.selectedItems.map((si, idx) => (
                                                                        <span key={idx} className="inline-flex items-center px-3 py-1 text-xs font-bold shadow-sm border rounded-none" style={{ backgroundColor: THEME.primaryLight, color: THEME.primary, borderColor: '#e2e8f0' }}>
                                                                            {si.name} × {si.count}
                                                                        </span>
                                                                    ))}
                                                                    {record.addonText && (
                                                                        <span className="inline-flex items-center px-3 py-1 text-xs font-bold border rounded-none" style={{ backgroundColor: THEME.warningBg, color: THEME.warning, borderColor: '#ffedd5' }}>
                                                                            加購：{record.addonText}
                                                                        </span>
                                                                    )}
                                                                </div>
                                                            </td>
                                                            <td className="px-6 py-4 font-black text-slate-800">
                                                                <span className="text-xs opacity-40 font-normal mr-1">NT$</span>
                                                                {Number(record.amount).toLocaleString()}
                                                            </td>
                                                            <td className="px-6 py-4 text-right">
                                                                <div className="flex justify-end gap-2">
                                                                    <button onClick={() => { setEditingRecordId(record.id); setEditFormData({...record}); }} className="p-2 text-slate-400 hover:text-slate-600 hover:bg-slate-100 rounded-lg transition-all">
                                                                        <Icon name="Pencil" size={16} />
                                                                    </button>
                                                                    <button onClick={() => deleteRecord(record.id)} className="p-2 text-slate-400 hover:text-red-800 hover:bg-red-50 rounded-lg transition-all">
                                                                        <Icon name="Trash" size={16} />
                                                                    </button>
                                                                </div>
                                                            </td>
                                                        </>
                                                    )}
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </section>
                        </div>
                    </div>

                    {/* 品項管理彈窗 */}
                    {isConfiguringItems && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-[2rem] shadow-2xl w-full max-w-md overflow-hidden">
                                <div className="p-8 border-b flex justify-between items-center bg-slate-50/50">
                                    <h3 className="text-xl font-black text-slate-800 flex items-center gap-2">
                                        <Icon name="ShoppingBag" size={22} style={{ color: THEME.primary }} /> 品項選單設定
                                    </h3>
                                    <button onClick={() => setIsConfiguringItems(false)} className="p-2 hover:bg-slate-200 rounded-full transition-colors"><Icon name="X" size={20} /></button>
                                </div>
                                <div className="p-8 space-y-4 max-h-[50vh] overflow-y-auto">
                                    {activeProject.items.map((item, idx) => (
                                        <div key={item.id} className="flex gap-3 items-center">
                                            <input className="flex-1 p-3 border border-slate-200 rounded-none text-sm font-bold focus:ring-2 focus:ring-slate-500 outline-none" value={item.name} onChange={(e) => {
                                                const newItems = [...activeProject.items];
                                                newItems[idx].name = e.target.value;
                                                updateProjectItems(newItems);
                                            }} />
                                            <input type="number" step="10" className="w-28 p-3 border border-slate-200 rounded-none text-sm font-bold style={{ color: THEME.success }} outline-none" value={item.price} onChange={(e) => {
                                                const newItems = [...activeProject.items];
                                                newItems[idx].price = Number(e.target.value);
                                                updateProjectItems(newItems);
                                            }} />
                                            <button onClick={() => updateProjectItems(activeProject.items.filter((_, i) => i !== idx))} className="p-2 text-slate-300 hover:text-red-500"><Icon name="Trash" size={18} /></button>
                                        </div>
                                    ))}
                                    <button onClick={() => updateProjectItems([...activeProject.items, { id: Date.now().toString(), name: '', price: 0 }])} className="w-full p-4 border-2 border-dashed border-slate-200 rounded-none text-slate-400 hover:border-slate-300 hover:text-slate-600 transition-all text-sm font-bold">+ 新增自定義品項</button>
                                </div>
                                <div className="p-8 bg-slate-50 border-t flex justify-end">
                                    <button onClick={() => setIsConfiguringItems(false)} className="px-8 py-3 text-white rounded-2xl font-black shadow-lg hover:scale-105 transition-all" style={{ backgroundColor: THEME.primary }}>完成保存</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
